name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.13.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create local AI config from secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node <<'NODE'
          const { writeFileSync } = require("node:fs");

          const key = process.env.GEMINI_API_KEY?.trim();
          if (!key) {
            throw new Error(
              "Missing GitHub Actions secret GEMINI_API_KEY. Set it in repository settings before deploy.",
            );
          }

          const content = `/**
           * Auto-generated in CI from GitHub Actions secret.
           * This file is generated during deploy and must not be committed.
           */
          export const GEMINI_MODEL = [
            "gemini-2.5-flash-lite",
            "gemini-2.5-flash",
            "gemini-3-flash-preview",
            "gemini-2.5-pro",
          ];

          export const GEMINI_API_KEY = ${JSON.stringify(key)};
          `;

          writeFileSync("src/config/ai.config.local.ts", content, "utf8");
          NODE

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
